<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AroMi — Health Topic</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;color:#1e1b2e;overflow-x:hidden;min-height:100vh;background:#fdf2f8;}

.mesh-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 60% at 5% 10%,rgba(249,168,212,.70) 0%,transparent 55%),radial-gradient(ellipse 60% 60% at 90% 5%,rgba(196,181,253,.65) 0%,transparent 50%),radial-gradient(ellipse 55% 70% at 50% 95%,rgba(110,231,183,.55) 0%,transparent 55%),radial-gradient(ellipse 70% 50% at 95% 65%,rgba(249,168,212,.45) 0%,transparent 50%),radial-gradient(ellipse 50% 40% at 20% 70%,rgba(196,181,253,.40) 0%,transparent 50%),linear-gradient(150deg,#fdf2f8 0%,#f5f0ff 35%,#f0fdf9 70%,#fdf2f8 100%);animation:meshAnim 15s ease-in-out infinite alternate;}
@keyframes meshAnim{0%{filter:hue-rotate(0deg) brightness(1);}50%{filter:hue-rotate(8deg) brightness(1.02);}100%{filter:hue-rotate(-5deg) brightness(.99);}}

.glass{background:rgba(255,255,255,.30);border:1px solid rgba(255,255,255,.60);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px;box-shadow:0 8px 32px rgba(180,120,200,.15),inset 0 1px 0 rgba(255,255,255,.8);}
.glass-card{background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.75);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-radius:20px;box-shadow:0 12px 40px rgba(180,120,200,.18),inset 0 1px 0 rgba(255,255,255,.9);}
.grad{background:linear-gradient(135deg,#ec4899 0%,#8b5cf6 50%,#10b981 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* NAVBAR */
#navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.25);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.5);box-shadow:0 2px 20px rgba(180,120,200,.1);transition:transform .45s cubic-bezier(.4,0,.2,1),opacity .4s ease;}
#navbar.nav-hidden{transform:translateY(-100%);opacity:0;}
.nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-dot{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#8b5cf6,#10b981);animation:pulse 3s ease-in-out infinite;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.nav-dot svg{width:16px;height:16px;fill:#fff;}
@keyframes pulse{0%,100%{box-shadow:0 4px 14px rgba(139,92,246,.45);}50%{box-shadow:0 4px 26px rgba(139,92,246,.75);}}
.nav-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#ec4899,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
.nav-links a{padding:7px 18px;border-radius:50px;text-decoration:none;color:#4b4563;font-size:14px;font-weight:500;transition:all .25s ease;}
.nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.6);color:#8b5cf6;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-notif{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-size:.9rem;position:relative;transition:all .2s;}
.nav-notif:hover{background:#fff;transform:scale(1.08);}
.notif-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:#ec4899;border:1.5px solid #fff;}
.nav-profile{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#f9a8d4,#c4b5fd);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.7);font-size:15px;text-decoration:none;cursor:pointer;transition:all .25s ease;}
.nav-profile:hover{transform:scale(1.1);}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
.nav-hamburger span{display:block;width:22px;height:2px;background:#4b4563;border-radius:2px;}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;z-index:999;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,190,220,.3);padding:16px 20px;flex-direction:column;gap:4px;}
.mobile-menu.open{display:flex;}
.mobile-menu a{padding:12px 16px;border-radius:14px;text-decoration:none;color:#4b4563;font-size:15px;font-weight:500;transition:all .2s;}
.mobile-menu a:hover{background:rgba(139,92,246,.08);color:#8b5cf6;}

/* PAGE */
.page{position:relative;z-index:1;padding-top:64px;max-width:1160px;margin:0 auto;padding-left:32px;padding-right:32px;padding-bottom:80px;}

/* HERO BANNER */
.topic-hero{padding:44px 48px;margin:32px 0 28px;position:relative;overflow:hidden;display:flex;align-items:center;gap:40px;}
.topic-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.05));pointer-events:none;}
.hero-glow{position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(80px);opacity:.35;right:-60px;top:-60px;pointer-events:none;transition:background .4s ease;}
.hero-emoji{font-size:5rem;flex-shrink:0;animation:emojiFloat 4s ease-in-out infinite;filter:drop-shadow(0 8px 24px rgba(180,120,200,.3));}
@keyframes emojiFloat{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-12px) rotate(3deg);}}
.hero-text{flex:1;}
.hero-breadcrumb{display:flex;align-items:center;gap:6px;font-size:.75rem;color:#a0a0b8;margin-bottom:12px;font-weight:500;}
.hero-breadcrumb a{color:#8b5cf6;text-decoration:none;transition:color .2s;}
.hero-breadcrumb a:hover{color:#ec4899;}
.hero-breadcrumb span{opacity:.5;}
.hero-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:50px;font-size:.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.85);color:#7c6f9a;margin-bottom:12px;}
.hero-title{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(28px,5vw,52px);color:#1e1b2e;line-height:1.08;letter-spacing:-1px;margin-bottom:10px;}
.hero-desc{font-size:1rem;color:#7c6f9a;line-height:1.7;max-width:520px;font-weight:300;margin-bottom:20px;}
.hero-stats{display:flex;gap:20px;flex-wrap:wrap;}
.hstat{display:flex;flex-direction:column;gap:2px;}
.hstat-val{font-family:'Playfair Display',serif;font-weight:700;font-size:1.2rem;color:#1e1b2e;}
.hstat-label{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:#a0a0b8;font-weight:500;}

/* QUICK ACTIONS */
.quick-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;}
.qa-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .25s ease;border:none;text-decoration:none;}
.qa-primary{background:linear-gradient(135deg,#ec4899,#8b5cf6);color:#fff;box-shadow:0 4px 18px rgba(139,92,246,.35);}
.qa-primary:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(139,92,246,.5);}
.qa-ghost{background:rgba(255,255,255,.55);border:1.5px solid rgba(255,255,255,.8);color:#4b4563;backdrop-filter:blur(10px);}
.qa-ghost:hover{background:rgba(255,255,255,.85);transform:translateY(-2px);}

/* MAIN LAYOUT */
.topic-layout{display:grid;grid-template-columns:1fr 300px;gap:22px;align-items:start;}
.left-col{display:flex;flex-direction:column;gap:20px;}
.right-col{display:flex;flex-direction:column;gap:18px;position:sticky;top:80px;}

/* SECTION CARD */
.sec-card{padding:28px;position:relative;overflow:hidden;}
.sec-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;}
.sc-pink::before{background:linear-gradient(90deg,#ec4899,#f9a8d4);}
.sc-lav::before{background:linear-gradient(90deg,#8b5cf6,#c4b5fd);}
.sc-mint::before{background:linear-gradient(90deg,#10b981,#6ee7b7);}
.sc-amber::before{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.sc-blue::before{background:linear-gradient(90deg,#3b82f6,#93c5fd);}
.sec-label{font-size:.68rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.sl-pink{color:#ec4899;} .sl-lav{color:#8b5cf6;} .sl-mint{color:#10b981;} .sl-amber{color:#f59e0b;} .sl-blue{color:#3b82f6;}

/* PRECAUTIONS */
.prec-list{display:flex;flex-direction:column;gap:12px;}
.prec-item{display:flex;align-items:flex-start;gap:13px;padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.9);transition:transform .2s ease;}
.prec-item:hover{transform:translateX(4px);}
.prec-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px;}
.prec-text{font-size:.88rem;color:#4b4563;line-height:1.6;font-weight:400;}
.prec-tip{font-size:.76rem;color:#a0a0b8;margin-top:3px;}

/* FOODS */
.foods-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.food-card{padding:16px 14px;border-radius:16px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.9);text-align:center;transition:transform .25s ease,box-shadow .25s ease;cursor:default;}
.food-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(180,120,200,.2);}
.food-emoji{font-size:1.8rem;margin-bottom:7px;}
.food-name{font-size:.82rem;font-weight:600;color:#1e1b2e;margin-bottom:3px;}
.food-benefit{font-size:.7rem;color:#7c6f9a;line-height:1.4;}

/* EXERCISES */
.ex-list{display:flex;flex-direction:column;gap:12px;}
.ex-item{display:flex;align-items:flex-start;gap:14px;padding:16px;border-radius:14px;background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.9);transition:transform .2s ease;}
.ex-item:hover{transform:translateX(4px);}
.ex-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(16,185,129,.12));}
.ex-body{}
.ex-name{font-size:.9rem;font-weight:600;color:#1e1b2e;margin-bottom:3px;}
.ex-desc{font-size:.78rem;color:#7c6f9a;line-height:1.5;}
.ex-freq{display:inline-flex;align-items:center;margin-top:5px;font-size:.7rem;font-weight:600;padding:2px 9px;border-radius:50px;background:rgba(16,185,129,.1);color:#10b981;}

/* DID YOU KNOW */
.facts-list{display:flex;flex-direction:column;gap:14px;}
.fact-item{display:flex;gap:13px;align-items:flex-start;padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.9);}
.fact-ico{font-size:1.2rem;flex-shrink:0;margin-top:1px;}
.fact-text{font-size:.85rem;color:#4b4563;line-height:1.6;}
.fact-text strong{color:#1e1b2e;}

/* RISK METER */
.risk-meter-card{padding:22px;}
.rm-title{font-size:.68rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#ec4899;margin-bottom:14px;}
.rm-gauge{position:relative;width:110px;height:110px;margin:0 auto 14px;}
.rm-gauge svg{width:100%;height:100%;}
.rm-track{fill:none;stroke:rgba(200,190,220,.2);stroke-width:9;}
.rm-fill{fill:none;stroke-width:9;stroke-linecap:round;stroke-dasharray:283;stroke-dashoffset:283;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);}
.rm-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rm-num{font-family:'Playfair Display',serif;font-weight:900;font-size:1.4rem;line-height:1;}
.rm-sub{font-size:.6rem;color:#a0a0b8;text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.rm-label{text-align:center;font-size:.85rem;font-weight:600;color:#1e1b2e;margin-bottom:4px;}
.rm-desc{text-align:center;font-size:.75rem;color:#7c6f9a;line-height:1.5;}

/* QUICK STATS */
.qstats-card{padding:20px;}
.qs-title{font-size:.68rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#8b5cf6;margin-bottom:14px;}
.qs-items{display:flex;flex-direction:column;gap:10px;}
.qs-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:12px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.9);}
.qs-icon{font-size:1.1rem;flex-shrink:0;width:30px;text-align:center;}
.qs-body{flex:1;}
.qs-val{font-size:.85rem;font-weight:600;color:#1e1b2e;}
.qs-key{font-size:.7rem;color:#a0a0b8;}

/* RELATED TOPICS */
.related-card{padding:20px;}
.rel-title{font-size:.68rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#10b981;margin-bottom:14px;}
.rel-items{display:flex;flex-direction:column;gap:8px;}
.rel-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.85);text-decoration:none;transition:all .2s ease;}
.rel-item:hover{background:rgba(255,255,255,.8);transform:translateX(3px);}
.rel-emoji{font-size:1.1rem;flex-shrink:0;}
.rel-name{font-size:.83rem;font-weight:500;color:#4b4563;flex:1;}
.rel-arrow{font-size:.75rem;color:#c0b8d0;}

/* CHECKLIST */
.checklist{display:flex;flex-direction:column;gap:10px;}
.cl-item{display:flex;align-items:center;gap:10px;cursor:pointer;}
.cl-box{width:20px;height:20px;border-radius:6px;border:2px solid rgba(200,190,220,.5);background:rgba(255,255,255,.6);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;transition:all .2s;color:transparent;}
.cl-item.checked .cl-box{background:linear-gradient(135deg,#10b981,#6ee7b7);border-color:transparent;color:#fff;}
.cl-text{font-size:.85rem;color:#4b4563;transition:color .2s;}
.cl-item.checked .cl-text{color:#a0a0b8;text-decoration:line-through;}

/* NOT FOUND */
.not-found{text-align:center;padding:80px 20px;}
.nf-emoji{font-size:4rem;margin-bottom:16px;}
.nf-title{font-family:'Playfair Display',serif;font-weight:700;font-size:1.6rem;color:#1e1b2e;margin-bottom:8px;}
.nf-desc{font-size:.9rem;color:#7c6f9a;margin-bottom:24px;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .6s ease,transform .6s cubic-bezier(.4,0,.2,1);}
.reveal.in{opacity:1;transform:none;}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);z-index:9999;background:rgba(30,27,46,.9);color:#fff;padding:12px 24px;border-radius:50px;font-size:.85rem;font-weight:500;backdrop-filter:blur(12px);opacity:0;transition:all .4s cubic-bezier(.34,1.3,.64,1);pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{position:relative;z-index:1;text-align:center;padding:28px 24px;font-size:13px;color:#7c6f9a;border-top:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.2);backdrop-filter:blur(12px);}
footer a{color:#8b5cf6;text-decoration:none;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:10px;}

/* RESPONSIVE */
@media(max-width:1000px){
  .topic-layout{grid-template-columns:1fr;}
  .right-col{position:static;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .related-card{grid-column:1/-1;}
}
@media(max-width:900px){
  #navbar{padding:0 20px;}
  .nav-links{display:none;}
  .nav-hamburger{display:flex;}
  .page{padding-left:18px;padding-right:18px;}
  .topic-hero{padding:28px 24px;flex-direction:column;gap:16px;text-align:center;}
  .hero-glow{display:none;}
  .hero-emoji{font-size:3.5rem;}
  .hero-stats{justify-content:center;}
  .hero-desc{margin:0 auto;}
  .foods-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:640px){
  .page{padding-left:14px;padding-right:14px;}
  .topic-hero{margin:20px 0 18px;padding:22px 18px;}
  .hero-title{font-size:clamp(24px,7vw,36px);}
  .quick-actions{gap:8px;}
  .qa-btn{flex:1;justify-content:center;padding:10px 14px;}
  .right-col{grid-template-columns:1fr;}
  .foods-grid{grid-template-columns:repeat(2,1fr);}
  .sec-card{padding:20px 16px;}
}
@media(max-width:420px){
  .nav-name{font-size:18px;}
  .foods-grid{grid-template-columns:repeat(2,1fr);}
  .hero-emoji{font-size:2.8rem;}
}
</style>
</head>
<body>
<div class="mesh-bg"></div>

<!-- NAVBAR -->
<nav id="navbar">
  <a href="home.html" class="nav-brand">

      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <span class="nav-name">AroMi</span>
  </a>
  <ul class="nav-links">
    <li><a href="home.html">🏠 Home</a></li>

  </ul>

  <a href="prediction.html" onclick="toggleMenu()">🔮 Predictions</a>
  <a href="profile.html" onclick="toggleMenu()">👤 Profile</a>
</div>

<div class="page" id="mainPage">
  <!-- Dynamic content injected by JS -->
</div>

<footer>
  <p>© 2025 <strong>AroMi</strong> — Your AI Health Companion &nbsp;·&nbsp; <a href="#">Privacy</a> &nbsp;·&nbsp; <a href="#">Terms</a></p>

</footer>

<div class="toast" id="toast"></div>

<script>
/* ══ NAV ══ */
const navbar=document.getElementById('navbar');
window.addEventListener('scroll',()=>{navbar.classList.toggle('nav-hidden',window.scrollY>80);},{passive:true});
document.addEventListener('mousemove',e=>{if(e.clientY<80)navbar.classList.remove('nav-hidden');});
document.addEventListener('touchstart',e=>{if(e.touches[0].clientY<80)navbar.classList.remove('nav-hidden');},{passive:true});
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open');}
document.addEventListener('click',e=>{const m=document.getElementById('mobileMenu');if(m.classList.contains('open')&&!m.contains(e.target)&&!e.target.closest('.nav-hamburger'))m.classList.remove('open');});

/* ══ TOAST ══ */
let toastT;
function showToast(msg,dur=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),dur);}

/* ══ ALL TOPIC DATA ══ */
const topics = {
  brain:{
    icon:'🧠', title:'Brain Health', tag:'Neurology', color:'lav', glow:'rgba(139,92,246,.5)',
    desc:'Your brain is your most vital organ — governing thought, memory, emotion, and every bodily function. Protecting your cognitive health today prevents neurological decline tomorrow.',
    stats:[{val:'100B',label:'Neurons'},{val:'20%',label:'Body Energy'},{val:'1.4kg',label:'Avg Weight'},{val:'60%',label:'Fat Content'}],
    riskScore:22, riskLabel:'Low Risk', riskColor:'#10b981',
    qstats:[{icon:'💧',val:'Hydrate 2L+/day',key:'Brain function'},{icon:'😴',val:'7–8 hours sleep',key:'Memory consolidation'},{icon:'📵',val:'2h screen breaks',key:'Eye & brain strain'},{icon:'🧘',val:'10 min meditation',key:'Stress reduction'}],

      <a href="history.html" class="qa-btn qa-ghost">📊 Log Health Data</a>
      <button class="qa-btn qa-ghost" onclick="showToast('${t.title} guide saved! 📌')">📌 Save Guide</button>
      <button class="qa-btn qa-ghost" onclick="shareGuide()">🔗 Share</button>
    </div>

    <!-- LAYOUT -->
    <div class="topic-layout">
      <div class="left-col">

        <!-- PRECAUTIONS -->
        <div class="sec-card glass-card sc-pink reveal">
          <div class="sec-label sl-pink">⚠️ Precautions & Prevention</div>
          <div class="prec-list">
            ${t.prec.map((p,i)=>`
              <div class="prec-item">
                <div class="prec-num">${i+1}</div>
                <div>
                  <div class="prec-text">${p.text}</div>
                  ${p.tip?`<div class="prec-tip">💡 ${p.tip}</div>`:''}
                </div>
              </div>`).join('')}
          </div>
        </div>

        <!-- FOODS -->
        <div class="sec-card glass-card sc-mint reveal">
          <div class="sec-label sl-mint">🥗 Recommended Foods</div>
          <div class="foods-grid">
            ${t.foods.map(f=>`
              <div class="food-card">
                <div class="food-emoji">${f.emoji}</div>
                <div class="food-name">${f.name}</div>
                <div class="food-benefit">${f.benefit}</div>
              </div>`).join('')}
          </div>
        </div>

        <!-- EXERCISES -->
        <div class="sec-card glass-card sc-lav reveal">
          <div class="sec-label sl-lav">🏋️ Exercises & Activities</div>
          <div class="ex-list">
            ${t.exercises.map(e=>`
              <div class="ex-item">
                <div class="ex-icon">${e.icon}</div>
                <div class="ex-body">
                  <div class="ex-name">${e.name}</div>
                  <div class="ex-desc">${e.desc}</div>
                  <span class="ex-freq">📅 ${e.freq}</span>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <!-- DID YOU KNOW -->
        <div class="sec-card glass-card sc-amber reveal">
          <div class="sec-label sl-amber">💡 Did You Know?</div>
          <div class="facts-list">
            ${t.facts.map(f=>`
              <div class="fact-item">
                <div class="fact-ico">${f.ico}</div>
                <div class="fact-text">${f.text}</div>
              </div>`).join('')}
          </div>
        </div>

      </div>

      <!-- RIGHT COL -->
      <div class="right-col">

        <!-- RISK METER -->
        <div class="risk-meter-card glass-card reveal">
          <div class="rm-title">🎯 General Risk Level</div>
          <div class="rm-gauge">
            <svg viewBox="0 0 90 90">
              <defs>
                <linearGradient id="rmg" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="${t.riskColor}"/>
                  <stop offset="100%" stop-color="${t.riskColor}99"/>
                </linearGradient>
              </defs>
              <circle class="rm-track" cx="45" cy="45" r="35"/>
              <circle class="rm-fill" id="rmFill" cx="45" cy="45" r="35" stroke="url(#rmg)"/>
            </svg>
            <div class="rm-center">
              <div class="rm-num" style="color:${t.riskColor}">${t.riskScore}%</div>
              <div class="rm-sub">risk</div>
            </div>
          </div>
          <div class="rm-label" style="color:${t.riskColor}">${t.riskLabel}</div>
          <div class="rm-desc">Based on average population data. Get an <a href="prediction.html" style="color:#8b5cf6;text-decoration:none;font-weight:500;">AI Prediction</a> for your personal risk.</div>
        </div>

        <!-- QUICK STATS -->
        <div class="qstats-card glass-card reveal">
          <div class="qs-title">✅ Daily Goals</div>
          <div class="qs-items">
            ${t.qstats.map(q=>`
              <div class="qs-item">
                <div class="qs-icon">${q.icon}</div>
                <div class="qs-body">
                  <div class="qs-val">${q.val}</div>
                  <div class="qs-key">${q.key}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <!-- DAILY CHECKLIST -->
        <div class="sec-card glass-card sc-mint reveal" style="padding:20px;">
          <div class="sec-label sl-mint" style="margin-bottom:14px;">☑️ Daily Checklist</div>
          <div class="checklist">
            ${t.checklist.map((item,i)=>`
              <div class="cl-item" onclick="toggleCheck(this)" id="cl${i}">
                <div class="cl-box">✓</div>
                <span class="cl-text">${item}</span>
              </div>`).join('')}
          </div>
        </div>

        <!-- RELATED TOPICS -->
        <div class="related-card glass-card reveal">
          <div class="rel-title">🔗 Related Topics</div>
          <div class="rel-items">${relItems}</div>
        </div>

      </div>
    </div>
  `;

  // Animate risk ring after render
  setTimeout(()=>{
    const fill = document.getElementById('rmFill');
    if(fill) fill.style.strokeDashoffset = rOff;
  },300);

  // Init reveal
  document.querySelectorAll('.reveal').forEach(el=>ro.observe(el));
}

function openPred(topicId){
  const areaMap={brain:'Brain / Head',eye:'Eyes',ear:'Ears',heart:'Heart / Chest',lung:'Lungs / Respiratory',liver:'Liver / Digestive',kidney:'Kidneys / Urinary',bone:'Bones / Joints',skin:'Skin',mental:'Mental Health',digestive:'Liver / Digestive',immunity:'Immunity / General'};
  window.location.href='prediction.html?body_area='+encodeURIComponent(areaMap[topicId]||'Immunity / General')+'&age=28&gender=Female&symptoms=General+checkup&sleep=7–8+hours&exercise=3–4x+%2F+week&diet=Balanced+%2F+Mixed&stress=Low&height=168&weight=62&conditions=None';
}

function shareGuide(){
  if(navigator.clipboard) navigator.clipboard.writeText(window.location.href).then(()=>showToast('Link copied! 🔗'));
  else showToast('Link copied! 🔗');
}

/* ══ NAV ══ */
const navbar=document.getElementById('navbar');
window.addEventListener('scroll',()=>{navbar.classList.toggle('nav-hidden',window.scrollY>80);},{passive:true});
document.addEventListener('mousemove',e=>{if(e.clientY<80)navbar.classList.remove('nav-hidden');});
document.addEventListener('touchstart',e=>{if(e.touches[0].clientY<80)navbar.classList.remove('nav-hidden');},{passive:true});
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open');}
document.addEventListener('click',e=>{const m=document.getElementById('mobileMenu');if(m.classList.contains('open')&&!m.contains(e.target)&&!e.target.closest('.nav-hamburger'))m.classList.remove('open');});

document.addEventListener('DOMContentLoaded', render);
</script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</body>
</html>
