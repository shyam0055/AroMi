<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AroMi — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --pink: #f9a8d4;
    --lavender: #c4b5fd;
    --mint: #6ee7b7;
    --pink-deep: #ec4899;
    --lav-deep: #8b5cf6;
    --mint-deep: #10b981;
    --glass-bg: rgba(255,255,255,0.35);
    --glass-border: rgba(255,255,255,0.6);
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --radius-card: 28px;
    --radius-btn: 50px;
    --radius-input: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; font-family: var(--font-body); overflow-x: hidden; }

  body {
    background: linear-gradient(150deg, #fdf2f8, #f5f0ff, #f0fdf9, #fdf2f8);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem 1rem;
  }

  /* mesh */
  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 70% 60% at 5%  10%,  rgba(249,168,212,0.70) 0%, transparent 70%),
      radial-gradient(ellipse 60% 60% at 90%  5%,  rgba(196,181,253,0.65) 0%, transparent 70%),
      radial-gradient(ellipse 55% 70% at 50% 95%,  rgba(110,231,183,0.55) 0%, transparent 70%),
      radial-gradient(ellipse 70% 50% at 95% 65%,  rgba(249,168,212,0.45) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 20% 70%,  rgba(196,181,253,0.40) 0%, transparent 70%);
  }

  /* ambient orbs */
  .amb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 1; }
  .amb-1 { width:420px;height:420px;background:rgba(249,168,212,0.25);top:-80px;left:-80px;animation:floatA 9s ease-in-out infinite;}
  .amb-2 { width:380px;height:380px;background:rgba(196,181,253,0.25);bottom:-60px;right:-60px;animation:floatA 11s ease-in-out 2s infinite reverse;}
  @keyframes floatA { 0%,100%{transform:translateY(0);}50%{transform:translateY(-24px);} }

  /* back link */
  .back-link {
    position: fixed; top: 24px; left: 28px; z-index: 100;
    display: inline-flex; align-items: center; gap: 6px;
    color: #7a7a90; font-size: 0.87rem; font-weight: 500;
    text-decoration: none;
    background: rgba(255,255,255,0.6); border: 1px solid var(--glass-border);
    border-radius: 50px; padding: 8px 18px; backdrop-filter: blur(12px);
    transition: all 0.2s ease;
    opacity:0;animation:fadeUp 0.5s ease 0.1s forwards;
  }
  .back-link:hover{background:rgba(255,255,255,0.9);color:var(--lav-deep);transform:translateX(-3px);}

  /* card */
  .card {
    position: relative; z-index: 10;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-card);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    padding: 44px 40px 40px;
    width: 100%; max-width: 460px;
    box-shadow: 0 24px 80px rgba(180,120,200,0.18), 0 4px 16px rgba(0,0,0,0.05);
    opacity:0;animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
  }
  .card::before {
    content:''; position:absolute; top:0;left:0;right:0;height:4px;
    border-radius:4px 4px 0 0;
    background:linear-gradient(90deg,#ec4899,#8b5cf6);
  }

  /* brand */
  .brand {
    display:flex;align-items:center;gap:10px;margin-bottom:28px;
    opacity:0;animation:fadeUp 0.6s ease 0.4s forwards;
  }
  .brand-logo {
    width:42px;height:42px;border-radius:50%;
    background:linear-gradient(135deg,#ec4899,#8b5cf6,#10b981);
    display:flex;align-items:center;justify-content:center;
    animation:pulse 2.5s ease-in-out infinite;
    box-shadow:0 0 0 0 rgba(139,92,246,0.4);
  }
  .brand-logo svg{width:20px;height:20px;fill:white;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,0.4);}50%{box-shadow:0 0 0 8px rgba(139,92,246,0.0);}}
  .brand-name {
    font-family:var(--font-display);font-weight:700;font-size:1.3rem;
    background:linear-gradient(135deg,#ec4899,#8b5cf6);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }

  /* headings */
  .heading {
    font-family:var(--font-display);font-weight:700;font-size:1.75rem;color:#2d2d3a;
    margin-bottom:6px;
    opacity:0;animation:fadeUp 0.6s ease 0.5s forwards;
  }
  .subheading {
    font-size:0.9rem;font-weight:300;color:#8a8aa0;margin-bottom:28px;
    opacity:0;animation:fadeUp 0.6s ease 0.6s forwards;
  }

  /* google btn */
  .google-btn {
    width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
    padding:13px 20px;border-radius:var(--radius-btn);
    background:rgba(255,255,255,0.8);border:1px solid rgba(200,200,220,0.6);
    font-family:var(--font-body);font-weight:500;font-size:0.95rem;color:#3c3c50;
    cursor:pointer;transition:all 0.2s ease;
    box-shadow:0 2px 12px rgba(0,0,0,0.07);
    opacity:0;animation:fadeUp 0.6s ease 0.7s forwards;
  }
  .google-btn:hover{background:#fff;box-shadow:0 6px 24px rgba(0,0,0,0.12);transform:translateY(-2px);}
  .google-btn svg{width:20px;height:20px;flex-shrink:0;}

  /* divider */
  .divider {
    display:flex;align-items:center;gap:12px;margin:20px 0;
    opacity:0;animation:fadeUp 0.5s ease 0.8s forwards;
  }
  .divider-line{flex:1;height:1px;background:rgba(180,120,200,0.2);}
  .divider-text{font-size:0.8rem;color:#aaa;font-weight:400;white-space:nowrap;}

  /* form */
  .form-group {
    display:flex;flex-direction:column;gap:6px;margin-bottom:16px;
    opacity:0;animation:fadeUp 0.5s ease var(--delay, 0.9s) forwards;
  }
  label{font-size:0.87rem;font-weight:500;color:#5a5a70;}

  .input-wrap { position:relative; }
  .input-icon {
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    font-size:1rem;pointer-events:none;opacity:0.55;
  }
  input[type="email"],
  input[type="password"],
  input[type="text"] {
    width:100%;padding:13px 14px 13px 42px;
    border-radius:var(--radius-input);
    border:1.5px solid rgba(200,190,220,0.45);
    background:rgba(255,255,255,0.65);
    font-family:var(--font-body);font-size:0.95rem;color:#2d2d3a;
    outline:none;transition:border 0.2s ease,box-shadow 0.2s ease,background 0.2s ease;
    backdrop-filter:blur(8px);
  }
  input:focus {
    border-color:var(--lav-deep);
    background:rgba(255,255,255,0.9);
    box-shadow:0 0 0 3px rgba(139,92,246,0.12);
  }
  input::placeholder{color:#bbb;}

  /* password toggle */
  .pwd-toggle {
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;font-size:1rem;opacity:0.5;
    transition:opacity 0.2s;padding:0;
  }
  .pwd-toggle:hover{opacity:0.9;}

  /* forgot */
  .forgot-row {
    display:flex;justify-content:flex-end;margin-top:-8px;margin-bottom:12px;
    opacity:0;animation:fadeUp 0.5s ease 1.1s forwards;
  }
  .forgot-link{font-size:0.83rem;color:var(--lav-deep);text-decoration:none;font-weight:500;}
  .forgot-link:hover{text-decoration:underline;}

  /* submit btn */
  .submit-btn {
    width:100%;padding:14px;border-radius:var(--radius-btn);border:none;cursor:pointer;
    background:linear-gradient(135deg,#ec4899,#8b5cf6);
    font-family:var(--font-body);font-weight:600;font-size:1rem;color:#fff;
    box-shadow:0 8px 28px rgba(139,92,246,0.35);
    transition:transform 0.2s ease,box-shadow 0.2s ease;
    display:flex;align-items:center;justify-content:center;gap:8px;
    opacity:0;animation:fadeUp 0.5s ease 1.2s forwards;
    position:relative;overflow:hidden;
  }
  .submit-btn::after {
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
    opacity:0;transition:opacity 0.2s;
  }
  .submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(139,92,246,0.45);}
  .submit-btn:hover::after{opacity:1;}
  .submit-btn:active{transform:scale(0.97);}

  /* loading spinner */
  .spinner {
    width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);
    border-top-color:#fff;border-radius:50%;
    animation:spin 0.7s linear infinite;display:none;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* switch link */
  .switch-row {
    text-align:center;margin-top:20px;font-size:0.88rem;color:#8a8aa0;
    opacity:0;animation:fadeUp 0.5s ease 1.3s forwards;
  }
  .switch-row a{color:var(--lav-deep);font-weight:500;text-decoration:none;}
  .switch-row a:hover{text-decoration:underline;}

  /* strength bar */
  .strength-bar-wrap{display:none;margin-top:6px;}
  .strength-bar {
    height:4px;border-radius:4px;background:#eee;overflow:hidden;
  }
  .strength-fill{height:100%;border-radius:4px;width:0;transition:width 0.3s ease,background 0.3s ease;}
  .strength-label{font-size:0.75rem;margin-top:4px;font-weight:500;}

  /* error msg */
  .err-msg{font-size:0.8rem;color:#ef4444;margin-top:4px;display:none;}

  /* success overlay */
  #successOverlay {
    position:fixed;inset:0;z-index:999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(150deg,#fdf2f8,#f5f0ff,#f0fdf9);
    opacity:0;pointer-events:none;transition:opacity 0.5s ease;
  }
  #successOverlay.show{opacity:1;pointer-events:all;}
  .success-icon{font-size:3.5rem;margin-bottom:16px;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;}
  @keyframes popIn{from{transform:scale(0);}to{transform:scale(1);}}
  .success-title{font-family:var(--font-display);font-weight:700;font-size:1.8rem;color:#2d2d3a;margin-bottom:8px;}
  .success-sub{font-size:0.95rem;color:#8a8aa0;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  nav,#navbar{padding:0 20px !important;}
  .back-link{top:14px;left:14px;font-size:.8rem;padding:6px 14px;}
  .progress-wrap{top:14px;padding:6px 14px;}
  .step span{display:none;}
  .card{padding:32px 24px 28px;margin:0 auto;}
}
@media(max-width:600px){
  body{padding:1rem .75rem !important;}
  .card{padding:28px 18px 24px;border-radius:20px;}
  .heading{font-size:1.45rem !important;}
  .subheading{font-size:.85rem !important;}
  .form-grid{grid-template-columns:1fr !important;}
  .google-btn{font-size:.88rem;padding:12px 16px;}
  .submit-btn{font-size:.92rem;padding:13px;}
  .brand-name{font-size:1.1rem;}
  .switch-row{font-size:.82rem;}
  .benefits{gap:7px;}
  .benefit-chip{font-size:.72rem;padding:4px 10px;}
  .terms-row{font-size:.78rem;}
}
@media(max-width:380px){
  .card{padding:22px 14px 20px;}
  .heading{font-size:1.25rem !important;}
}

</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="amb amb-1"></div>
<div class="amb amb-2"></div>

<a href="auth-choice.html" class="back-link">← Back</a>

<!-- Success overlay -->
<div id="successOverlay">
  <div class="success-icon">✅</div>
  <div class="success-title">Welcome back!</div>
  <div class="success-sub">Taking you to your dashboard…</div>
</div>

<div class="card">

  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <span class="brand-name">AroMi</span>
  </div>

  <h1 class="heading">Welcome back 👋</h1>
  <p class="subheading">Sign in to continue your health journey.</p>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">Sign in with email</span>
    <div class="divider-line"></div>
  </div>

  <!-- Login form -->
  <div class="form-group" style="--delay:0.85s;">
    <label for="email">Email Address</label>
    <div class="input-wrap">
      <span class="input-icon">✉️</span>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <span class="err-msg" id="emailErr">Please enter a valid email address.</span>
  </div>

  <div class="form-group" style="--delay:0.95s;">
    <label for="password">Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      <button type="button" class="pwd-toggle" id="pwdToggle" onclick="togglePwd('password','pwdToggle')">👁️</button>
    </div>
    <span class="err-msg" id="pwdErr">Password is required.</span>
  </div>

  <div class="forgot-row">
    <a href="#" class="forgot-link" onclick="showForgot(event)">Forgot password?</a>
  </div>

  <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
    <span id="loginBtnText">Sign In</span>
    <div class="spinner" id="loginSpinner"></div>
  </button>

  <div class="switch-row">
    Don't have an account? <a href="signup.html">Create one →</a>
  </div>
</div>

<script>
  function togglePwd(inputId, btnId) {
    const inp = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁️'; }
  }

  function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const pwd   = document.getElementById('password').value;
    let valid = true;

    document.getElementById('emailErr').style.display = 'none';
    document.getElementById('pwdErr').style.display   = 'none';

    if (!validateEmail(email)) {
      document.getElementById('emailErr').style.display = 'block'; valid = false;
    }
    if (!pwd) {
      document.getElementById('pwdErr').style.display = 'block'; valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('loginBtnText');
    const spinner = document.getElementById('loginSpinner');

    btnText.textContent = 'Signing in…';
    spinner.style.display = 'block';
    btn.disabled = true;

    try {
      if (typeof aromi_signIn !== 'function') {
        throw new Error('Authentication client not initialized');
      }

      const { data, error } = await aromi_signIn(email, pwd);
      if (error || !data || !data.user) {
        throw new Error(error?.message || 'Invalid email or password');
      }

      try {
        // Keep navbar avatar working by syncing a lightweight user object
        localStorage.setItem('aromi_user', JSON.stringify({
          id: data.user.id,
          email: data.user.email,
          name: data.user.user_metadata?.full_name || data.user.email
        }));
      } catch (_) {}

      const overlay = document.getElementById('successOverlay');
      overlay.classList.add('show');
      setTimeout(() => { window.location.href = 'home.html'; }, 1200);
    } catch (err) {
      alert('Sign-in failed: ' + (err.message || 'please check your credentials and try again.'));
      btnText.textContent = 'Sign In';
      spinner.style.display = 'none';
      btn.disabled = false;
    }
  }

  function showForgot(e) {
    e.preventDefault();
    alert('Password reset link will be sent to your email.\n\n// TODO: Connect to backend reset API');
  }

  // Enter key submit
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

  // Live email validation
  document.getElementById('email').addEventListener('blur', function() {
    if (this.value && !validateEmail(this.value)) {
      document.getElementById('emailErr').style.display = 'block';
    } else {
      document.getElementById('emailErr').style.display = 'none';
    }
  });
</script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</body>
</html>
